{% extends 'nids_dashboard/base.html' %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/hacker.css' %}">

<div class="row justify-content-center">
    <div class="col-md-4 cyber-card animate__animated animate__fadeInUp">
        <h3 class="text-center mb-3">🧑‍💻 Register</h3>

        <form method="post">
            {% csrf_token %}
            <input name="username" class="form-control mb-3" placeholder="Username">
            <input name="email" class="form-control mb-3" placeholder="Email">
            <input type="password" name="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-cyber w-100">Create Account</button>
        </form>
    </div>
</div>

{% endblock %}
