<h2>Detection Results</h2>

<p>Normal Traffic: {{ normal }}</p>
<p>Attack Traffic: {{ attack }}</p>

<canvas id="attackChart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('attackChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Normal', 'Attack'],
        datasets: [{
            data: [{{ normal }}, {{ attack }}],
        }]
    }
});
</script>
