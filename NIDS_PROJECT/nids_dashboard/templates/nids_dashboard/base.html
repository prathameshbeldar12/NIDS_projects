{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>NIDS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'nids_dashboard/css/style.css' %}">
</head>

<body style="
background: url('{% static 'nids_dashboard/images/cyber-bg.jpg' %}');
background-size: cover;
color: #00ffcc;
">

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="{% url 'dashboard' %}">NIDS</a>
    <div class="ms-auto">
        <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-info me-2">Dashboard</a>
        <a href="{% url 'upload' %}" class="btn btn-sm btn-outline-warning me-2">Upload CSV</a>
        <a href="{% url 'logs' %}" class="btn btn-sm btn-outline-danger me-2">Logs</a>
        <a href="{% url 'stats' %}" class="btn btn-sm btn-outline-success me-2">Stats</a>
        <a href="{% url 'about' %}" class="btn btn-sm btn-outline-info me-2">About</a>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'nids_dashboard/js/main.js' %}"></script>

{% if messages %}
    {% for message in messages %}
        <script>
            showAlert("{{ message }}", "{{ message.tags }}");
        </script>
    {% endfor %}
{% endif %}
</body>
</html>
