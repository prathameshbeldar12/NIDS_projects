{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #000428, #004e92);
            color: white;
        }
        .upload-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
        }
        .upload-box:hover {
            box-shadow: 0 0 30px #00eaff;
        }
    </style>
</head>

<body class="cyber-bg">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="upload-box animate__animated animate__zoomIn text-center">
        <h2>📂 Upload Network CSV</h2>
        <p>Upload traffic data to detect cyber attacks</p>
{% if messages %}
<div class="container position-absolute top-0 mt-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="csv_file" class="form-control mb-3" required>
            <button class="btn btn-info w-100">Analyze Traffic</button>
        </form>
           
    </div>
  
</div> 
<div class="container position-absolute top-0 mt-3">
<a href="{% url 'dashboard' %}" class="btn btn-danger">⬅ Back</a>
</div>
</body>
</html>
