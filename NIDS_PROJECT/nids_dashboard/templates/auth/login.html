{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | NIDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/hacker.css' %}">

    <link rel="stylesheet" href="{% static 'nids_dashboard/css/style.css' %}">
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="
background: url('/static/nids_dashboard/images/cyber-bg.jpg');
background-size: cover;
color: #00ffcc;">
<body class="d-flex justify-content-center align-items-center vh-100">
   

<div class="cyber-card animate__animated animate__fadeInDown col-md-4">
    <h3 class="text-center mb-4">🔐 Secure Login</h3>
 {% for message in messages %}
<p class="text-danger text-center">{{ message }}</p>
{% endfor %}
    <form method="post">
        {% csrf_token %}
        <input name="username" class="form-control mb-3" placeholder="Username">
        <input type="password" name="password" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-cyber w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
        No account? <a href="{% url 'register' %}">Register</a>
    </p>
    <p class="mt-3 text-center">
    <a href="{% url 'forgot' %}">Forgot Password?</a>
    </p>
</div>
</body>
</html>
