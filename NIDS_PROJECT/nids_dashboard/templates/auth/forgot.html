{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="
background: url('/static/nids_dashboard/images/cyber-bg.jpg');
background-size: cover;
color: #00ffcc;">

<div class="card">
    <h2>🔑 Reset Access</h2>

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Registered Email" required>
        <button type="submit">Send OTP</button>
    </form>

    <br>
    <a href="{% url 'login' %}">⬅ Back to Login</a>
</div>

</body>
</html>
