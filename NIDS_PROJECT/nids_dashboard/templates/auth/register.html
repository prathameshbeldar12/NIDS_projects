{% extends 'nids_dashboard/base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/hacker.css' %}">

<div class="row justify-content-center">
    <div class="col-md-4 cyber-card animate__animated animate__fadeInUp">
        <h3 class="text-center mb-3">🧑‍💻 Register</h3>

        <form method="post">
            {% csrf_token %}
            <input name="username" class="form-control mb-3" placeholder="Username"required>
            <input name="email" class="form-control mb-3" placeholder="Email"required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password"required>
            <input type="password"class="form-control mb-3"name="confirm_password" placeholder="Confirm Password"required>

            <button class="btn btn-cyber w-100">Create Account</button>
        </form>
         <p class="mt-3 text-center">
         Back <a href="{% url 'login' %}">login</a>
    </p>
    </div>
</div>

{% endblock %}
